<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Walk Run Wrestle Hub</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    :root{
      --text:#ffffff;
      --muted:rgba(255,255,255,.72);

      --rattle-green-1:#048d64;
      --rattle-green-2:#06a879;

      --warrior-blue:#3558ff;
      --warrior-pink:#ff27d6;
      --coming-bg:#2a2a2f;
      --coming-border:#3a3a42;
      --coming-text:#a1a1aa;
    }

    @keyframes warriorGlow{
      0%{box-shadow:0 16px 34px rgba(53,88,255,.28),0 0 26px rgba(255,39,214,.18);}
      50%{box-shadow:0 22px 44px rgba(53,88,255,.36),0 0 42px rgba(255,39,214,.28);}
      100%{box-shadow:0 16px 34px rgba(53,88,255,.28),0 0 26px rgba(255,39,214,.18);}
    }

    @keyframes shine{
      0%{transform:translateX(-120%)}
      100%{transform:translateX(140%)}
    }

    body{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:24px 16px;
      color:var(--text);
      background:
        radial-gradient(700px 320px at 50% 0%, rgba(4,141,100,.18), transparent 60%),
        linear-gradient(180deg, #111, #080808);
    }

    .wrap{
      width:100%;
      max-width:480px;
      text-align:center;
    }

    .logo{
      max-width:250px;
      margin:24px auto 14px;
      display:block;
      filter:drop-shadow(0 0 24px rgba(4,141,100,.22));
    }

    h1{
      font-size:2rem;
      font-weight:900;
      margin-bottom:8px;
      text-transform:uppercase;
    }

    .subtext{
      color:var(--muted);
      font-size:.95rem;
      line-height:1.5;
      margin-bottom:16px;
    }

    .site-button{
      display:inline-block;
      margin-bottom:22px;
      padding:12px 18px;
      border-radius:999px;
      text-decoration:none;
      color:#fff;
      font-weight:800;
      font-size:.9rem;
      background:linear-gradient(135deg, #1f1f25, #141418);
      border:1px solid rgba(255,255,255,.08);
